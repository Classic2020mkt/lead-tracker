// ── GET: fetch all data from GAS ─────────────────────────────────────────────
const gasGet=()=>new Promise((res,rej)=>{
  const cb="cb_"+Date.now()+"_"+Math.random().toString(36).slice(2);
  const s=document.createElement("script");
  const timeout=setTimeout(()=>{
    delete window[cb];
    try{document.body.removeChild(s);}catch{}
    rej(new Error("GAS GET timeout"));
  },15000);
  s.src=GAS+"?callback="+cb;
  window[cb]=d=>{
    clearTimeout(timeout);
    res(d);
    delete window[cb];
    try{document.body.removeChild(s);}catch{}
  };
  s.onerror=e=>{clearTimeout(timeout);delete window[cb];try{document.body.removeChild(s);}catch{};rej(e);};
  document.body.appendChild(s);
});

// ── POST: send JSON to GAS in small reliable chunks ─────────────────────────
// Uses smaller chunks (400 chars), retries failed chunks 3 times,
// and sends chunks sequentially with delays to avoid cache misses.
const gasPost=d=>new Promise((res)=>{
  const json=JSON.stringify(d);
  const chunkSize=400; // smaller = more reliable URL encoding
  const chunks=[];
  for(let i=0;i<json.length;i+=chunkSize){
    chunks.push(encodeURIComponent(json.slice(i,i+chunkSize)));
  }
  if(chunks.length===0){res({ok:true});return;}

  const saveId="s"+Date.now()+"_"+Math.random().toString(36).slice(2,6);
  const total=chunks.length;
  let attempts=0;

  const sendChunk=(idx)=>{
    if(idx>=total){res({ok:true});return;}
    const cb="cb_"+saveId+"_"+idx;
    const s=document.createElement("script");
    let done=false;

    const timeout=setTimeout(()=>{
      if(done)return;
      done=true;
      delete window[cb];
      try{document.body.removeChild(s);}catch{}
      // Retry up to 3 times on timeout
      attempts++;
      if(attempts<=3){
        console.warn("Chunk "+idx+" timed out, retry "+attempts);
        setTimeout(()=>sendChunk(idx),500*attempts);
      } else {
        attempts=0;
        sendChunk(idx+1); // skip and continue
      }
    },10000);

    s.src=GAS+"?callback="+cb+"&sid="+saveId+"&idx="+idx+"&tot="+total+"&d="+chunks[idx];
    window[cb]=(r)=>{
      if(done)return;
      done=true;
      clearTimeout(timeout);
      delete window[cb];
      try{document.body.removeChild(s);}catch{}
      attempts=0;
      // Small delay between chunks to avoid overwhelming GAS cache
      setTimeout(()=>sendChunk(idx+1), 50);
    };
    s.onerror=()=>{
      if(done)return;
      done=true;
      clearTimeout(timeout);
      delete window[cb];
      try{document.body.removeChild(s);}catch{}
      setTimeout(()=>sendChunk(idx+1), 200);
    };
    document.body.appendChild(s);
  };
  sendChunk(0);
});

function Login({users,onLogin}){
  const [u,setU]=useState("");const [p,setP]=useState("");const [sp,setSp]=useState(false);const [err,setErr]=useState("");const [shk,setShk]=useState(false);
  const go=()=>{
    const usr=users.find(x=>x.username.toLowerCase()===u.trim().toLowerCase());
    if(!usr){setErr("Username not found.");setShk(true);setTimeout(()=>setShk(false),500);return;}
    if(usr.password!==p){setErr("Incorrect password.");setShk(true);setTimeout(()=>setShk(false),500);return;}
    onLogin(usr);
  };
  return(
    <div style={{minHeight:"100vh",background:P.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{width:"100%",maxWidth:420}}>
        <div style={{textAlign:"center",marginBottom:24}}>

          <h1 style={{margin:"0 0 4px",fontSize:26,fontWeight:800,color:P.tp,fontFamily:"Georgia,serif"}}>Lead Tracker</h1>

        <div className={shk?"shk":""} style={{background:P.card,border:`1.5px solid ${P.bdr}`,borderRadius:16,padding:"24px 26px 20px",boxShadow:P.sh}}>
          <Fld label="Username"><Inp value={u} onChange={e=>{setU(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&go()} placeholder="Enter username" autoFocus/></Fld>
          <Fld label="Password">
            <div style={{position:"relative"}}><Inp type={sp?"text":"password"} value={p} onChange={e=>{setP(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&go()} placeholder="Enter password" style={{paddingRight:40}}/>

        </div>

function LeadForm({lead,onSave,onClose,users}){

function UserMgmt({users,onSaveUsers,cu}){
  const [editId,setEditId]=useState(null);const [isNew,setIsNew]=useState(false);const [showPwd,setShowPwd]=useState({});const [delId,setDelId]=useState(null);
  const E={id:"",name:"",username:"",password:"",email:"",role:"sales"};
  const [f,setF]=useState(E);const [err,setErr]=useState({});
  const set=k=>e=>setF(p=>({...p,[k]:e.target.value}));
  const openEdit=u=>{setF({...u,password:""});setEditId(u.id);setIsNew(false);setErr({});};
  const openNew=()=>{setF({...E,id:uid()});setIsNew(true);setEditId(null);setErr({});};
  const cancel=()=>{setEditId(null);setIsNew(false);setF(E);setErr({});};
  const validate=()=>{const e={};if(!f.name.trim())e.name="Required";if(!f.username.trim())e.username="Required";else if(users.some(u=>u.username===f.username&&u.id!==f.id))e.username="Already taken";if(isNew&&f.password.length<4)e.password="Min 4 chars";if(!f.email.includes("@"))e.email="Valid email";setErr(e);return!Object.keys(e).length;};
  const save=()=>{if(!validate())return;let nu;if(isNew){nu=[...users,{...f}];}else{const pwd=f.password.trim()||users.find(u=>u.id===editId)?.password||"";nu=users.map(u=>u.id===editId?{...f,password:pwd,id:u.id}:u);}onSaveUsers(nu);cancel();};
  const del=id=>{if(id===cu.id){alert("Cannot delete yourself.");return;}onSaveUsers(users.filter(u=>u.id!==id));setDelId(null);};
  const show=editId||isNew;
  return(
    <div style={{display:"grid",gridTemplateColumns:show?"1fr 380px":"1fr",gap:20,alignItems:"start"}}>
      <div>
        <div style={{display:"flex",alignItems:"center",marginBottom:14}}><h3 style={{margin:0,fontFamily:"Georgia,serif",fontSize:18,color:P.tp}}>Team Members</h3><Btn sm icon="plus" onClick={openNew} style={{marginLeft:"auto"}}>Add User</Btn></div>
        {users.map(u=>(
          <div key={u.id} style={{background:P.card,border:`1.5px solid ${editId===u.id?P.acc+"88":P.bdr}`,borderRadius:12,padding:15,marginBottom:10,boxShadow:P.sh}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
              <Av name={u.name} sz={38}/>
              <div style={{flex:1,minWidth:0}}><div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}><span style={{fontWeight:800,fontSize:14,color:P.tp}}>{u.name}</span><Bdg label={u.role.toUpperCase()} color={u.role==="admin"?P.acc:P.inf} sm/>{u.id===cu.id&&<Bdg label="YOU" color={P.suc} sm/>}</div><div style={{fontSize:11,color:P.ts,marginTop:2}}>@{u.username} · {u.email}</div></div>
              <div style={{display:"flex",gap:6}}>
                <button onClick={()=>openEdit(u)} style={{background:P.bg,border:`1.5px solid ${P.bdr}`,borderRadius:7,padding:"5px 10px",cursor:"pointer",color:P.ts,display:"flex",alignItems:"center",gap:4,fontSize:11,fontWeight:700,fontFamily:"inherit"}}><Ic n="edit" s={11}/>Edit</button>
                {u.id!==cu.id&&<button onClick={()=>setDelId(u.id)} style={{background:"#FEF2F2",border:`1.5px solid ${P.dan}44`,borderRadius:7,padding:"5px 10px",cursor:"pointer",color:P.dan,display:"flex",alignItems:"center",gap:4,fontSize:11,fontWeight:700,fontFamily:"inherit"}}><Ic n="trash" s={11} c={P.dan}/>Del</button>}
              </div>
            </div>
          </div>
        ))}
      </div>
      {show&&(
        <div style={{background:P.card,border:`1.5px solid ${P.acc}55`,borderRadius:14,padding:22,boxShadow:P.sh,position:"sticky",top:20}}>
          <h4 style={{margin:"0 0 16px",fontFamily:"Georgia,serif",fontSize:16,color:P.tp}}>{isNew?"Add New User":"Edit User"}</h4>
          <Fld label="Full Name" req err={err.name}><Inp value={f.name} onChange={set("name")}/></Fld>
          <Fld label="Username" req err={err.username} hint="Used to log in"><Inp value={f.username} onChange={set("username")} autoComplete="off"/></Fld>
          <Fld label="Email" req err={err.email}><Inp type="email" value={f.email} onChange={set("email")}/></Fld>
          <Fld label={isNew?"Password":"New Password"} err={err.password} hint={isNew?"Min 4 chars":"Blank = keep existing"}><Inp type="password" value={f.password} onChange={set("password")} autoComplete="new-password"/></Fld>
          <Fld label="Role"><Sel value={f.role} onChange={set("role")}><option value="sales">Sales Representative</option><option value="admin">Admin</option></Sel></Fld>
          <Div/>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><Btn v="gh" onClick={cancel}>Cancel</Btn><Btn onClick={save} icon="ok">{isNew?"Create":"Save"}</Btn></div>
        </div>
      )}
      {delId&&(
        <div style={{position:"fixed",inset:0,background:"rgba(26,39,68,0.38)",backdropFilter:"blur(4px)",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{background:P.card,borderRadius:14,padding:24,maxWidth:360,width:"90%"}}>
            <h3 style={{margin:"0 0 8px",fontFamily:"Georgia,serif",color:P.tp}}>Delete User?</h3>
            <p style={{margin:"0 0 18px",fontSize:13,color:P.ts}}>Delete <strong>{users.find(u=>u.id===delId)?.name}</strong>?</p>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><Btn v="gh" onClick={()=>setDelId(null)}>Cancel</Btn><Btn v="dan" icon="trash" onClick={()=>del(delId)}>Delete</Btn></div>
          </div>
        </div>
      )}
    </div>
  );
}

  useEffect(()=>{leadsRef.current=leads;},[leads]);
  useEffect(()=>{emailsRef.current=emails;},[emails]);
  useEffect(()=>{usersRef.current=users;},[users]);

  const loadData=useCallback(async(quiet=false)=>{
    try{
      const d=await gasGet();
      if(d.users?.length)setUsers(d.users);
      if(d.leads)setLeads(d.leads);
      if(d.emails)setEmails(d.emails);
      setLastSync(new Date());
      setConnErr(false);
    }catch(e){setConnErr(true);}
    if(!quiet)setLoading(false);
  },[]);

  useEffect(()=>{loadData();},[]);

  // ── FIX: persist now reads from refs so it always gets the latest data ───
  // The core bug was: setLeads(nl) is async, so gasPost(nl, emails, users)
  // would capture stale `emails` and `users` from the closure.
  // Now we pass the new values explicitly and also update refs immediately.
  const persist=useCallback((nl,ne,nu)=>{
    clearTimeout(saveTimer.current);
    setSaving(true);
    // Update state
    setLeads(nl);
    setEmails(ne);
    setUsers(nu);
    // Update refs immediately so the next persist in the same tick is correct
    leadsRef.current=nl;
    emailsRef.current=ne;
    usersRef.current=nu;
    // Debounce the actual GAS save
    saveTimer.current=setTimeout(async()=>{
      try{
        // Use refs to capture the very latest values at save time
        await gasPost({
          leads:leadsRef.current,
          emails:emailsRef.current,
          users:usersRef.current
        });
        setLastSync(new Date());
        setConnErr(false);
      }catch{
        setConnErr(true);
      }finally{
        setSaving(false);
      }
    },500);
  },[]);

  const saveUsers=nu=>persist(leadsRef.current,emailsRef.current,nu);

  const addLead=d=>{
    const l={...d,id:uid(),stage:"Opportunities",createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),remarks:d.notes?.trim()?[{id:uid(),author:cu.name,authorId:cu.id,role:cu.role,text:d.notes,date:new Date().toISOString(),channel:""}]:[]};
    const nl=[l,...leadsRef.current];
    persist(nl,emailsRef.current,usersRef.current);
    setShowLF(false);
  };

  const updLead=l=>{
    const nl=leadsRef.current.map(x=>x.id===l.id?l:x);
    setSelLead(l);
    persist(nl,emailsRef.current,usersRef.current);
  };

  const addEmail=d=>{
    const ne=[{
      ...d,
      id:uid(),
      createdBy:cu.id,
      createdByName:cu.name,
      createdByRole:cu.role,
      createdAt:new Date().toISOString(),
      updatedAt:new Date().toISOString(),
      remarks:[],
      converted:false
    },...emailsRef.current];
    persist(leadsRef.current,ne,usersRef.current);
    setShowEF(false);
  };

  const updEmail=e=>{
    const ne=emailsRef.current.map(x=>x.id===e.id?e:x);
    setSelEmail(e);
    persist(leadsRef.current,ne,usersRef.current);
  };

  // ── FIX: convert now builds nl/ne from refs and awaits gasPost directly ──
  const convert=async(log)=>{
    const l={
      id:uid(),
      company:log.toCompany,
      contact:log.toContact||"",
      email:log.toEmail,
      mobile:"",
      businessType:"",
      leadSource:"Outbound Email",
      clientSector:log.clientSector,
      assignedTo:cu.id,
      stage:"Opportunities",
      createdAt:new Date().toISOString(),
      updatedAt:new Date().toISOString(),
      fromEmailLog:true,
      remarks:[{id:uid(),author:cu.name,authorId:cu.id,role:cu.role,text:`Converted from email: "${log.subject}"`,date:new Date().toISOString(),channel:"Email",sys:true}]
    };
    const updatedLog={...log,converted:true,updatedAt:new Date().toISOString()};
    const nl=[l,...leadsRef.current];
    const ne=emailsRef.current.map(e=>e.id===log.id?updatedLog:e);

    // Update state + refs immediately
    setLeads(nl);
    setEmails(ne);
    leadsRef.current=nl;
    emailsRef.current=ne;
    setSelEmail(null);
    setView("leads");

    // Save directly (don't debounce — conversion is critical)
    setSaving(true);
    clearTimeout(saveTimer.current);
    try{
      await gasPost({leads:nl,emails:ne,users:usersRef.current});
      setLastSync(new Date());
      setConnErr(false);
    }catch{
      setConnErr(true);
    }finally{
      setSaving(false);
    }
  };

  const importLeadsCSV=nl=>{const ex=new Set(leadsRef.current.map(l=>l.email.toLowerCase()));const fr=nl.filter(l=>!ex.has(l.email.toLowerCase()));if(!fr.length){alert("No new leads.");return;}const m=[...fr,...leadsRef.current];persist(m,emailsRef.current,usersRef.current);alert(`✓ Imported ${fr.length} leads.`);};
  const importEmailsCSV=ne=>{const ex=new Set(emailsRef.current.map(e=>(e.toEmail+e.subject).toLowerCase()));const fr=ne.filter(e=>!ex.has((e.toEmail+e.subject).toLowerCase()));if(!fr.length){alert("No new emails.");return;}const m=[...fr,...emailsRef.current];persist(leadsRef.current,m,usersRef.current);alert(`✓ Imported ${fr.length} emails.`);};
  const parseCSV=txt=>{const lines=txt.split(/\r?\n/).filter(l=>l.trim());return lines.slice(1).map(line=>{const cols=[];let cur="",inQ=false;for(const ch of line){if(ch==='"'){inQ=!inQ;}else if(ch===","&&!inQ){cols.push(cur.trim());cur="";}else{cur+=ch;}}cols.push(cur.trim());return cols.map(c=>c.replace(/^"|"$/g,"").trim());}).filter(r=>r.some(c=>c));};
  const dlCSV=(s,name)=>{const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(s);a.download=name;document.body.appendChild(a);a.click();document.body.removeChild(a);};

  const fl=leads.filter(l=>{
    if(fsStage!=="All"&&l.stage!==fsStage)return false;
    if(fsSect!=="All"&&l.clientSector!==fsSect)return false;
    if(q&&!`${l.company} ${l.contact} ${l.email}`.toLowerCase().includes(q.toLowerCase()))return false;
    if(cu?.role!=="admin"&&l.assignedTo&&l.assignedTo!==cu?.id)return false;
    return true;
  });

  if(loading)return(
    <div style={{minHeight:"100vh",background:P.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16,fontFamily:"'Segoe UI',sans-serif"}}>
      <div style={{width:48,height:48,borderRadius:13,background:P.sb,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="gs" s={22} c={P.acc}/></div>
      <div style={{fontSize:14,fontWeight:700,color:P.ts}}>Connecting to Google Sheets…</div>
    </div>
  );

  if(!li)return <Login users={users} onLogin={u=>{
    setCu(u);setLi(true);
    // Send ONLY the loginLog — tiny payload, always fits in 1 chunk
    gasPost({loginLog:{userId:u.id,userName:u.name,userRole:u.role,username:u.username,loginTime:new Date().toISOString()}});
  }}/>;

  const NAV=[{id:"dash",label:"Dashboard",icon:"bk"},{id:"leads",label:"Leads Pipeline",icon:"usr"},{id:"emails",label:"Email Log",icon:"em"},{id:"import",label:"Import Data",icon:"dl"},{id:"track",label:"Conversion Tracker",icon:"ch"},...(cu.role==="admin"?[{id:"users",label:"User Management",icon:"shd"}]:[])];

      <div style={{width:210,background:P.sb,display:"flex",flexDirection:"column",flexShrink:0,position:"sticky",top:0,height:"100vh"}}>

            <Ic n="gs" s={10} c="#6EE7B7"/><span style={{fontSize:9,color:"#6EE7B7",fontWeight:700}}>Google Sheets Connected</span>

              <Ic n={item.icon} s={14} c={a?P.acc:"rgba(255,255,255,0.35)"}/>{item.label}
            </button>

        </nav>
        <div style={{padding:"12px 14px 16px",borderTop:"1px solid rgba(255,255,255,0.07)"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
            <Av name={cu.name} sz={30}/>
            <div style={{flex:1,minWidth:0}}><div style={{fontSize:12,fontWeight:800,color:"rgba(255,255,255,0.9)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{cu.name}</div><div style={{fontSize:9,color:P.acc,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.5px"}}>{cu.role}</div></div>
          </div>
          <button onClick={()=>{setCu(null);setLi(false);setView("dash");}} style={{display:"flex",alignItems:"center",gap:7,width:"100%",padding:"7px 10px",background:"rgba(220,38,38,0.12)",border:"1px solid rgba(220,38,38,0.25)",borderRadius:7,color:"#FCA5A5",cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"inherit"}}>
            <Ic n="out" s={12} c="#FCA5A5"/>Sign Out
          </button>
        </div>
      </div>

      <div style={{flex:1,overflowY:"auto",maxHeight:"100vh"}}>
        <div style={{background:P.card,borderBottom:`1px solid ${P.bdr}`,padding:"8px 28px",display:"flex",alignItems:"center",justifyContent:"flex-end",gap:12,position:"sticky",top:0,zIndex:50}}>
          {connErr&&<span style={{fontSize:11,color:P.dan,fontWeight:600}}>⚠ Connection error — check GAS script</span>}
          <span style={{fontSize:11,color:saving?P.acc:P.suc,fontWeight:600}}>{saving?"⏳ Saving to Google Sheets…":`✓ Synced ${lastSync?lastSync.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}):"—"}`}</span>
          <Btn v="gh" sm icon="rf" disabled={saving} onClick={()=>loadData(false)}>Refresh</Btn>
        </div>

        {view==="dash"&&(
          <div style={{padding:"24px 28px"}}>
            <h1 style={{margin:"0 0 4px",fontFamily:"Georgia,serif",fontSize:24,fontWeight:800,color:P.tp}}>Good {new Date().getHours()<12?"Morning":"Afternoon"}, {cu.name.split(" ")[0]} 👋</h1>
            <p style={{margin:"0 0 22px",color:P.ts,fontSize:13}}>{fd(new Date().toISOString())} · {leads.length} leads · {emails.length} emails · Google Sheets synced</p>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:22}}>
              {[[leads.length,"Total Leads",P.acc,"usr"],[leads.filter(l=>!["Contract Sign Off","Lead Lost to Competitor","Lead Lost Out of Scope"].includes(l.stage)).length,"Active Pipeline",P.inf,"ar"],[leads.filter(l=>l.stage==="Contract Sign Off").length,"Signed Off",P.suc,"ok"],[emails.length,"Email Logs","#7C3AED","em"]].map(([v,l,c,i])=>(
                <div key={l} style={{background:P.card,border:`1.5px solid ${P.bdr}`,borderRadius:12,padding:"16px 18px",display:"flex",alignItems:"center",gap:13,boxShadow:P.sh}}>
                  <div style={{width:40,height:40,borderRadius:10,background:c+"15",display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n={i} s={20} c={c}/></div>
                  <div><div style={{fontSize:24,fontWeight:900,color:P.tp,lineHeight:1,fontFamily:"Georgia,serif"}}>{v}</div><div style={{fontSize:11,color:P.ts,marginTop:3,fontWeight:600}}>{l}</div></div>
                </div>
              ))}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
              <div style={{background:P.card,border:`1.5px solid ${P.bdr}`,borderRadius:13,padding:22,boxShadow:P.sh}}>
                <h3 style={{margin:"0 0 16px",fontSize:14,color:P.tp,fontFamily:"Georgia,serif"}}>Stage Breakdown</h3>
                {ss.map(({stage,count})=>(
                  <div key={stage} style={{display:"flex",alignItems:"center",gap:9,marginBottom:9}}>
                    <div style={{width:8,height:8,borderRadius:"50%",background:SC[stage],flexShrink:0}}/>
                    <div style={{flex:1,fontSize:12,color:P.ts,fontWeight:600}}>{stage}</div>
                    <div style={{width:80,height:6,background:P.bg,borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:`${leads.length?(count/leads.length)*100:0}%`,background:SC[stage],borderRadius:3}}/></div>
                    <div style={{width:20,fontSize:12,color:P.tp,textAlign:"right",fontWeight:800}}>{count}</div>
                  </div>
                ))}
                {!leads.length&&<p style={{color:P.tm,fontSize:12,textAlign:"center",margin:"16px 0"}}>No leads yet.</p>}
              </div>
              <div style={{background:P.card,border:`1.5px solid ${P.bdr}`,borderRadius:13,padding:22,boxShadow:P.sh}}>
                <h3 style={{margin:"0 0 16px",fontSize:14,color:P.tp,fontFamily:"Georgia,serif"}}>Recent Activity</h3>
                {[...leads,...emails].sort((a,b)=>new Date(b.updatedAt||b.createdAt)-new Date(a.updatedAt||a.createdAt)).slice(0,7).map(item=>(
                  <div key={item.id} style={{display:"flex",alignItems:"center",gap:9,marginBottom:10,cursor:"pointer",padding:"5px 7px",borderRadius:7}} onClick={()=>{if(item.stage!==undefined){setSelLead(item);setView("leads");}else{setSelEmail(item);setView("emails");}}} onMouseEnter={e=>e.currentTarget.style.background=P.bg} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                    <div style={{width:8,height:8,borderRadius:"50%",background:item.stage?SC[item.stage]||P.inf:"#7C3AED",flexShrink:0}}/>
                    <div style={{flex:1,minWidth:0}}><div style={{fontSize:12,color:P.tp,fontWeight:700,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{item.company||item.toCompany}</div><div style={{fontSize:10,color:P.tm}}>{item.stage?"Lead":"Email"} · {fd(item.updatedAt||item.createdAt)}</div></div>
                    {item.stage&&<Bdg label={item.stage} color={SC[item.stage]||P.inf} sm/>}
                  </div>
                ))}
                {!leads.length&&!emails.length&&<p style={{color:P.tm,fontSize:12,textAlign:"center",margin:"20px 0"}}>No activity yet.</p>}
              </div>
            </div>
          </div>
        )}

        {view==="leads"&&(
          <div style={{padding:"24px 28px"}}>
            <div style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:20,flexWrap:"wrap"}}>
              <div><h1 style={{margin:0,fontFamily:"Georgia,serif",fontSize:22,fontWeight:800,color:P.tp}}>Leads Pipeline</h1><p style={{margin:"3px 0 0",color:P.ts,fontSize:12}}>{fl.length} leads{cu.role!=="admin"?" assigned to you":""}</p></div>
              <div style={{marginLeft:"auto",display:"flex",gap:7,flexWrap:"wrap",alignItems:"center"}}>
                <Inp placeholder="Search..." value={q} onChange={e=>setQ(e.target.value)} style={{width:160}}/>
                <Sel value={fsSect} onChange={e=>setFsSect(e.target.value)} style={{width:"auto"}}><option value="All">All Sectors</option>{SECTORS.map(s=><option key={s}>{s}</option>)}</Sel>
                <Sel value={fsStage} onChange={e=>setFsStage(e.target.value)} style={{width:"auto"}}><option value="All">All Stages</option>{STAGES.map(s=><option key={s}>{s}</option>)}</Sel>
                <Btn v="gh" sm onClick={()=>setLview(v=>v==="kanban"?"list":"kanban")}>{lview==="kanban"?"List":"Kanban"}</Btn>
                <Btn icon="plus" onClick={()=>setShowLF(true)}>New Lead</Btn>
              </div>
            </div>
            {lview==="kanban"&&(<>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
                {STAGES.slice(0,4).map(stage=>{const sl=fl.filter(l=>(l.stage||"Opportunities")===stage);return(
                  <div key={stage} style={{background:P.bg,border:`1.5px solid ${P.bdr}`,borderRadius:12,padding:12}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:12,paddingBottom:9,borderBottom:`2px solid ${SC[stage]}55`}}>
                      <div style={{width:9,height:9,borderRadius:"50%",background:SC[stage]}}/><span style={{fontSize:9,fontWeight:800,color:SC[stage],flex:1}}>{stage.toUpperCase()}</span>
                      <span style={{background:SC[stage],color:"#fff",borderRadius:9,padding:"1px 7px",fontSize:10,fontWeight:800}}>{sl.length}</span>
                    </div>
                    {sl.map(l=><KCard key={l.id} lead={l} users={users} onClick={()=>setSelLead(l)}/>)}
                    {!sl.length&&<div style={{textAlign:"center",padding:14,color:P.tm,fontSize:11,fontStyle:"italic"}}>Empty</div>}
                  </div>
                );})}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginTop:12}}>
                {STAGES.slice(4).map(stage=>{const sl=fl.filter(l=>(l.stage||"Opportunities")===stage);return(
                  <div key={stage} style={{background:P.bg,border:`1.5px solid ${P.bdr}`,borderRadius:12,padding:12}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:12,paddingBottom:9,borderBottom:`2px solid ${SC[stage]}55`}}>
                      <div style={{width:9,height:9,borderRadius:"50%",background:SC[stage]}}/><span style={{fontSize:9,fontWeight:800,color:SC[stage],flex:1}}>{stage.toUpperCase()}</span>
                      <span style={{background:SC[stage],color:"#fff",borderRadius:9,padding:"1px 7px",fontSize:10,fontWeight:800}}>{sl.length}</span>
                    </div>
                    {sl.map(l=><KCard key={l.id} lead={l} users={users} onClick={()=>setSelLead(l)}/>)}
                    {!sl.length&&<div style={{textAlign:"center",padding:14,color:P.tm,fontSize:11,fontStyle:"italic"}}>Empty</div>}
                  </div>
                );})}
              </div>
            </>)}
            {lview==="list"&&(
              <div style={{background:P.card,border:`1.5px solid ${P.bdr}`,borderRadius:12,overflow:"hidden",boxShadow:P.sh}}>
                <div style={{display:"grid",gridTemplateColumns:"2fr 1.5fr 1fr 1.5fr 1fr 0.8fr",padding:"10px 16px",borderBottom:`1.5px solid ${P.bdr}`,fontSize:9,color:P.tm,fontWeight:800,letterSpacing:"1px",textTransform:"uppercase",background:P.bg}}>
                  <span>Company</span><span>Sector/Source</span><span>Stage</span><span>Assigned</span><span>Updated</span><span>Remarks</span>
                </div>
                {fl.map(l=>{const u=users.find(x=>x.id===l.assignedTo);return(
                  <div key={l.id} onClick={()=>setSelLead(l)} style={{display:"grid",gridTemplateColumns:"2fr 1.5fr 1fr 1.5fr 1fr 0.8fr",padding:"11px 16px",borderBottom:`1px solid ${P.bdr}`,cursor:"pointer",alignItems:"center"}} onMouseEnter={e=>e.currentTarget.style.background=P.acl} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                    <div><div style={{fontWeight:800,fontSize:13,color:P.tp}}>{l.company}</div><div style={{fontSize:11,color:P.ts}}>{l.contact}</div></div>
                    <div style={{display:"flex",flexDirection:"column",gap:3}}><Bdg label={l.clientSector} color={P.inf} sm/><Bdg label={l.leadSource} color="#7C3AED" sm/></div>

                    <div style={{fontSize:11,color:P.ts}}>{fd(l.updatedAt||l.createdAt)}</div>
                    <div style={{fontSize:11,color:P.tm,display:"flex",alignItems:"center",gap:3}}><Ic n="msg" s={10} c={P.tm}/>{(l.remarks||[]).length}</div>

                {!fl.length&&<div style={{textAlign:"center",padding:40,color:P.tm,fontSize:12}}>No leads match filters.</div>}
              </div>

          </div>
        )}

        {view==="emails"&&(
          <div style={{padding:"24px 28px"}}>
            <div style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:20}}>
              <div><h1 style={{margin:0,fontFamily:"Georgia,serif",fontSize:22,fontWeight:800,color:P.tp}}>Outbound Email Log</h1><p style={{margin:"3px 0 0",color:P.ts,fontSize:12}}>{emails.length} emails · {emails.filter(e=>e.converted).length} converted</p></div>

              </div>
              {emails.map(log=>{const sc={"Sent":P.inf,"Replied":P.suc,"No Response":P.acc,"Bounced":P.dan,"Converted":"#7C3AED"};return(
                <div key={log.id} style={{display:"grid",gridTemplateColumns:"2fr 1.2fr 1fr 1fr 1fr 1fr auto",padding:"11px 16px",borderBottom:`1px solid ${P.bdr}`,cursor:"pointer",alignItems:"center"}} onClick={()=>setSelEmail(log)} onMouseEnter={e=>e.currentTarget.style.background=P.acl} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>

                  <div style={{display:"flex",alignItems:"center",gap:5}}>
                    <Av name={log.createdByName||"?"} sz={20}/>
                    <div><div style={{fontSize:11,fontWeight:700,color:P.tp}}>{log.createdByName||"Unknown"}</div><Bdg label={log.createdByRole==="admin"?"ADMIN":"SALES"} color={log.createdByRole==="admin"?P.acc:P.inf} sm/></div>
                  </div>
                  <Bdg label={log.clientSector} color={P.inf} sm/>
                  <div style={{fontSize:11,color:P.ts}}>{fd(log.sentDate)}</div>
                  <Bdg label={log.status} color={sc[log.status]||"#6B7280"} sm/>
                  <div><div style={{fontSize:11,color:P.ts,fontWeight:600}}>{log.toContact||"—"}</div><div style={{fontSize:10,color:P.tm}}>{log.toEmail}</div></div>
                  <div onClick={e=>e.stopPropagation()}>{!log.converted?<Btn v="suc" sm icon="cvt" onClick={()=>convert(log)}>Convert</Btn>:<Bdg label="✓ Lead" color={P.suc} sm/>}</div>
                </div>
              );})}
              {!emails.length&&<div style={{textAlign:"center",padding:50,color:P.tm,fontSize:12}}>No emails logged yet.</div>}
            </div>
          </div>
        )}

        {view==="import"&&(
          <div style={{padding:"24px 28px"}}>
            <h1 style={{margin:"0 0 4px",fontFamily:"Georgia,serif",fontSize:22,fontWeight:800,color:P.tp}}>Import Data</h1>
            <p style={{margin:"0 0 22px",color:P.ts,fontSize:12}}>Upload CSV files to add new leads or emails. Existing records are never overwritten.</p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
              <div style={{background:P.card,border:`1.5px solid ${P.bdr}`,borderRadius:14,padding:22,boxShadow:P.sh}}>
                <div style={{fontWeight:800,fontSize:14,color:P.tp,marginBottom:14}}>Import Leads</div>
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  <button onClick={()=>dlCSV("Company,Contact Person,Email,Mobile,Business Type,Lead Source,Client Sector,Assigned To\nAcme Corp,John Smith,john@acme.com,+971501234567,B2B,LinkedIn,Hotels,\n","leads_template.csv")} style={{display:"flex",alignItems:"center",gap:6,padding:"8px 12px",background:P.bg,border:`1.5px solid ${P.bdr}`,borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:700,color:P.ts,fontFamily:"inherit"}}><Ic n="dl" s={13} c={P.ts}/>Download Template</button>
                  <label style={{display:"flex",alignItems:"center",gap:6,padding:"8px 12px",background:`linear-gradient(135deg,${P.inf},#3B82F6)`,border:"none",borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:700,color:"#fff",fontFamily:"inherit"}}>
                    <Ic n="dl" s={13} c="#fff"/>Upload Leads CSV
                    <input type="file" accept=".csv" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const rows=parseCSV(ev.target.result);const nl=rows.map(cols=>{const[company="",contact="",email="",mobile="",businessType="",leadSource="",clientSector="",assignedTo=""]=cols;if(!company||!email||!email.includes("@"))return null;return{id:uid(),company,contact,email,mobile,businessType,leadSource,clientSector,assignedTo,stage:"Opportunities",createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),remarks:[]};}).filter(Boolean);importLeadsCSV(nl);}catch{alert("Error reading CSV.");}};r.readAsText(f);e.target.value="";}}/>
                  </label>
                </div>
                <div style={{marginTop:14,fontSize:11,color:P.tm}}>Currently <strong style={{color:P.tp}}>{leads.length}</strong> leads</div>
              </div>
              <div style={{background:P.card,border:`1.5px solid ${P.bdr}`,borderRadius:14,padding:22,boxShadow:P.sh}}>
                <div style={{fontWeight:800,fontSize:14,color:P.tp,marginBottom:14}}>Import Email Log</div>
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  <button onClick={()=>dlCSV("Subject,Company,Contact Person,Email,Client Sector,Date Sent,Status,Body\nIntro Email,Acme Corp,John Smith,john@acme.com,Hotels,2026-04-07,Sent,\n","emails_template.csv")} style={{display:"flex",alignItems:"center",gap:6,padding:"8px 12px",background:P.bg,border:`1.5px solid ${P.bdr}`,borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:700,color:P.ts,fontFamily:"inherit"}}><Ic n="dl" s={13} c={P.ts}/>Download Template</button>
                  <label style={{display:"flex",alignItems:"center",gap:6,padding:"8px 12px",background:"linear-gradient(135deg,#7C3AED,#9333EA)",border:"none",borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:700,color:"#fff",fontFamily:"inherit"}}>
                    <Ic n="dl" s={13} c="#fff"/>Upload Emails CSV
                    <input type="file" accept=".csv" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const rows=parseCSV(ev.target.result);const ne=rows.map(cols=>{const[subject="",toCompany="",toContact="",toEmail="",clientSector="",sentDate="",status="Sent",body=""]=cols;if(!subject||!toEmail||!toEmail.includes("@"))return null;return{id:uid(),subject,toCompany,toContact,toEmail,clientSector,sentDate:sentDate||new Date().toISOString().slice(0,10),status:status||"Sent",body,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),remarks:[],converted:false};}).filter(Boolean);importEmailsCSV(ne);}catch{alert("Error reading CSV.");}};r.readAsText(f);e.target.value="";}}/>
                  </label>
                </div>
                <div style={{marginTop:14,fontSize:11,color:P.tm}}>Currently <strong style={{color:P.tp}}>{emails.length}</strong> emails</div>
              </div>
            </div>
          </div>
        )}

        {view==="track"&&(
          <div style={{padding:"24px 28px"}}>
            <h1 style={{margin:"0 0 4px",fontFamily:"Georgia,serif",fontSize:22,fontWeight:800,color:P.tp}}>Conversion Tracker</h1>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14,marginBottom:20}}>
              {[[emails.length,"Outbound Emails",P.inf,"em"],[emails.filter(e=>e.converted).length,"Converted",P.suc,"ok"],[emails.length?Math.round((emails.filter(e=>e.converted).length/emails.length)*100)+"%":"0%","Conversion Rate",P.acc,"ch"]].map(([v,l,c,i])=>(
                <div key={l} style={{background:P.card,border:`1.5px solid ${P.bdr}`,borderRadius:12,padding:"16px 18px",display:"flex",alignItems:"center",gap:13,boxShadow:P.sh}}>
                  <div style={{width:40,height:40,borderRadius:10,background:c+"15",display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n={i} s={20} c={c}/></div>
                  <div><div style={{fontSize:24,fontWeight:900,color:P.tp,fontFamily:"Georgia,serif",lineHeight:1}}>{v}</div><div style={{fontSize:11,color:P.ts,marginTop:3,fontWeight:600}}>{l}</div></div>
                </div>
              ))}
            </div>
            <div style={{background:P.card,border:`1.5px solid ${P.bdr}`,borderRadius:13,padding:22,boxShadow:P.sh}}>
              <h3 style={{margin:"0 0 18px",fontSize:14,color:P.tp,fontFamily:"Georgia,serif"}}>Pipeline by Stage</h3>
              {STAGES.map(s=>{const cnt=leads.filter(l=>l.stage===s).length;const mx=Math.max(...STAGES.map(st=>leads.filter(l=>l.stage===st).length),1);return(
                <div key={s} style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
                  <div style={{width:160,fontSize:11,color:P.ts,fontWeight:600,flexShrink:0}}>{s}</div>
                  <div style={{flex:1,height:9,background:P.bg,borderRadius:4,overflow:"hidden",border:`1px solid ${P.bdr}`}}><div style={{height:"100%",width:`${(cnt/mx)*100}%`,background:SC[s],borderRadius:4,transition:"width .7s"}}/></div>
                  <div style={{fontSize:12,color:P.tp,width:20,textAlign:"right",fontWeight:800}}>{cnt}</div>
                </div>
              );})}
            </div>
          </div>
        )}

        {view==="users"&&cu.role==="admin"&&(
          <div style={{padding:"24px 28px"}}>
            <h1 style={{margin:"0 0 4px",fontFamily:"Georgia,serif",fontSize:22,fontWeight:800,color:P.tp}}>User Management</h1>
            <p style={{margin:"0 0 16px",color:P.ts,fontSize:12}}>{users.length} team members</p>
            <UserMgmt users={users} onSaveUsers={saveUsers} cu={cu}/>
          </div>
        )}
      </div>

      {showLF&&<Mdl title="Add New Lead" onClose={()=>setShowLF(false)} wide><LeadForm users={users} onClose={()=>setShowLF(false)} onSave={addLead}/></Mdl>}
      {showEF&&<Mdl title="Log Outbound Email" onClose={()=>setShowEF(false)} wide><EmailLogForm onClose={()=>setShowEF(false)} onSave={addEmail}/></Mdl>}
      {selLead&&<LeadDetail lead={selLead} onClose={()=>setSelLead(null)} onUpdate={updLead} cu={cu} users={users}/>}
      {selEmail&&(
        <Mdl title={selEmail.subject} subtitle={`${selEmail.toCompany} · ${selEmail.toEmail}`} onClose={()=>setSelEmail(null)} wide>
          <div style={{display:"flex",gap:7,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
            <Bdg label={selEmail.status} color={{"Sent":P.inf,"Replied":P.suc,"No Response":P.acc,"Bounced":P.dan,"Converted":"#7C3AED"}[selEmail.status]||"#6B7280"}/>
            <Bdg label={selEmail.clientSector} color={P.inf}/>
            <span style={{marginLeft:"auto"}}>{!selEmail.converted?<Btn v="suc" sm icon="cvt" onClick={()=>convert(selEmail)}>Convert to Lead</Btn>:<Bdg label="✓ Converted" color={P.suc}/>}</span>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 24px"}}>
            {[["Company",selEmail.toCompany],["Contact",selEmail.toContact||"—"],["Email",selEmail.toEmail],["Sector",selEmail.clientSector],["Date Sent",fd(selEmail.sentDate)],["Status",selEmail.status],["Logged By",selEmail.createdByName||"Unknown"],["Role",(selEmail.createdByRole||"sales").toUpperCase()]].map(([k,v])=>(
              <div key={k} style={{marginBottom:13}}><div style={{fontSize:10,color:P.tm,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:2}}>{k}</div><div style={{fontSize:13,color:P.tp,fontWeight:500}}>{v}</div></div>
            ))}
            {selEmail.body&&<div style={{gridColumn:"1/-1"}}><div style={{fontSize:10,color:P.tm,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:5}}>Body</div><div style={{background:P.bg,border:`1px solid ${P.bdr}`,borderRadius:8,padding:12,fontSize:12,color:P.ts,lineHeight:1.6,whiteSpace:"pre-wrap"}}>{selEmail.body}</div></div>}
          </div>
          <Div/>
          <Remarks remarks={selEmail.remarks}/>
          <RemarkBox onAdd={r=>updEmail({...selEmail,remarks:[...(selEmail.remarks||[]),r],updatedAt:new Date().toISOString()})} cu={cu}/>
        </Mdl>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
