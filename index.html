<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Lead Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;}
*{scrollbar-width:thin;scrollbar-color:#C8BEAF transparent;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:#C8BEAF;border-radius:2px;}
select option{background:#fff;color:#1A2744;}
@keyframes shk{0%,100%{transform:translateX(0)}25%,75%{transform:translateX(-8px)}50%{transform:translateX(8px)}}
.shk{animation:shk .4s ease}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin 1s linear infinite}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

const GAS="https://script.google.com/macros/s/AKfycbz5DIDJW7jTPg8Ky3AWAxLsjSwYFtw0Yx1pcx3pHLUZdUz18CIz796SXIgupfJZVdZR/exec";

const gasGet=()=>new Promise((res,rej)=>{
  const cb="cb_"+Date.now();
  const s=document.createElement("script");
  s.src=GAS+"?callback="+cb;
  window[cb]=d=>{res(d);delete window[cb];document.body.removeChild(s);};
  s.onerror=rej;
  document.body.appendChild(s);
});
const gasPost=d=>fetch(GAS,{method:"POST",body:JSON.stringify(d)});

const LS=["Inbound Email","Outbound Email","Word of Mouth","LinkedIn","Direct Marketing","Email Marketing","Former Clients","Driver Referrals"];
const STAGES=["Opportunities","Proposal","Negotiation","Gone Silent","Lead Lost to Competitor","Lead Lost Out of Scope","Contract Sign Off"];
const SECTORS=["Oil & Gas","Hotels","FMCG","Travel & Tours Co","Airline","Event Management Co","Semi-Govt Entity","Banks","Foreign Govt Office","Exhibitors"];
const CHANNELS=["Email","Call","WhatsApp","LinkedIn Messenger"];
const BTYPES=["B2B","B2C","B2G","Non-Profit","SME","Enterprise"];
const SC={"Opportunities":"#2563EB","Proposal":"#7C3AED","Negotiation":"#D97706","Gone Silent":"#6B7280","Lead Lost to Competitor":"#DC2626","Lead Lost Out of Scope":"#EA580C","Contract Sign Off":"#059669"};
const P={bg:"#F2EFE9",card:"#fff",sb:"#1A2744",acc:"#C9962A",bdr:"#E2D9CC",bdrk:"#C8BEAF",ibg:"#FAF9F6",tp:"#1A2744",ts:"#4B5A78",tm:"#94A3B8",acl:"#FEF3DC",dan:"#DC2626",suc:"#059669",inf:"#2563EB",sh:"0 2px 12px rgba(26,39,68,0.08)"};

const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const fd=d=>new Date(d).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});
const fdt=d=>new Date(d).toLocaleString("en-GB",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"});

const Av=({name,sz=28})=>{const i=(name||"?").split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();const cols=["#2563EB","#7C3AED","#059669","#D97706","#DC2626","#0891B2"];const c=cols[(name||"").charCodeAt(0)%cols.length];return <div style={{width:sz,height:sz,borderRadius:"50%",background:c+"18",border:`2px solid ${c}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:sz*.36,fontWeight:800,color:c,flexShrink:0}}>{i}</div>;};
const Bdg=({label,color="#6B7280",sm})=><span style={{display:"inline-flex",alignItems:"center",padding:sm?"2px 7px":"3px 10px",borderRadius:20,background:color+"18",color,border:`1px solid ${color}33`,fontSize:sm?10:11,fontWeight:700,whiteSpace:"nowrap"}}>{label}</span>;
const bi={background:P.ibg,border:`1.5px solid ${P.bdrk}`,borderRadius:8,padding:"9px 12px",color:P.tp,fontSize:13,width:"100%",boxSizing:"border-box",outline:"none",fontFamily:"inherit"};
const fo=e=>{e.target.style.borderColor=P.acc;e.target.style.boxShadow=`0 0 0 3px ${P.acc}18`;};
const fb=e=>{e.target.style.borderColor=P.bdrk;e.target.style.boxShadow="none";};
const Inp=p=><input {...p} style={{...bi,...p.style}} onFocus={fo} onBlur={fb}/>;
const Sel=({children,...p})=><select {...p} style={{...bi,...p.style,cursor:"pointer"}} onFocus={fo} onBlur={fb}>{children}</select>;
const Txa=p=><textarea {...p} style={{...bi,...p.style,resize:"vertical",minHeight:72}} onFocus={fo} onBlur={fb}/>;
const Btn=({onClick,children,v="pri",sm,icon,disabled,full,style:ex={}})=>{
  const vs={pri:{background:`linear-gradient(135deg,${P.acc},#E2AA2E)`,color:"#fff",border:"none"},sec:{background:"transparent",color:P.acc,border:`1.5px solid ${P.acc}`},dan:{background:"transparent",color:P.dan,border:`1.5px solid ${P.dan}`},gh:{background:P.bg,color:P.ts,border:`1.5px solid ${P.bdr}`},suc:{background:"transparent",color:P.suc,border:`1.5px solid ${P.suc}`},inf:{background:"transparent",color:P.inf,border:`1.5px solid ${P.inf}`}};
  return <button onClick={onClick} disabled={disabled} style={{...vs[v],borderRadius:8,padding:sm?"5px 11px":"8px 16px",fontSize:sm?11:13,fontWeight:700,cursor:disabled?"not-allowed":"pointer",opacity:disabled?.5:1,display:"inline-flex",alignItems:"center",gap:5,whiteSpace:"nowrap",fontFamily:"inherit",width:full?"100%":"auto",justifyContent:full?"center":"flex-start",...ex}}>{icon&&<Ic n={icon} s={sm?12:14}/>}{children}</button>;
};
const Fld=({label,req,err,hint,children})=><div style={{marginBottom:15}}><label style={{display:"block",marginBottom:5,fontSize:10,fontWeight:700,color:P.ts,letterSpacing:"0.8px",textTransform:"uppercase"}}>{label}{req&&<span style={{color:P.dan,marginLeft:2}}>*</span>}</label>{children}{hint&&!err&&<span style={{fontSize:10,color:P.tm,marginTop:3,display:"block"}}>{hint}</span>}{err&&<span style={{fontSize:10,color:P.dan,marginTop:3,display:"block",fontWeight:600}}>⚠ {err}</span>}</div>;
const Div=()=><div style={{height:1,background:P.bdr,margin:"18px 0"}}/>;
const Mdl=({title,subtitle,onClose,children,wide})=>(
  <div style={{position:"fixed",inset:0,background:"rgba(26,39,68,0.42)",backdropFilter:"blur(5px)",zIndex:1000,display:"flex",alignItems:"flex-start",justifyContent:"center",padding:"28px 16px",overflowY:"auto"}}>
    <div style={{background:P.card,borderRadius:16,width:"100%",maxWidth:wide?900:620,boxShadow:"0 24px 60px rgba(26,39,68,0.2)",border:`1px solid ${P.bdr}`,marginBottom:28}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",padding:"18px 24px 14px",borderBottom:`1px solid ${P.bdr}`}}>
        <div><h2 style={{margin:0,fontSize:16,fontWeight:800,color:P.tp,fontFamily:"Georgia,serif"}}>{title}</h2>{subtitle&&<p style={{margin:"3px 0 0",fontSize:12,color:P.ts}}>{subtitle}</p>}</div>
        <button onClick={onClose} style={{background:P.bg,border:`1px solid ${P.bdr}`,borderRadius:7,padding:6,cursor:"pointer",display:"flex",marginLeft:12}}><Ic n="X" s={14}/></button>
      </div>
      <div style={{padding:24}}>{children}</div>
    </div>
  </div>
);

const Ic=({n,s=16,c="currentColor"})=>{
  const d={
    X:<path d="M18 6L6 18M6 6l12 12" stroke={c} fill="none" strokeWidth="2" strokeLinecap="round"/>,
    plus:<path d="M12 5v14M5 12h14" stroke={c} fill="none" strokeWidth="2" strokeLinecap="round"/>,
    edit:<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" stroke={c} fill="none" strokeWidth="1.8" strokeLinecap="round"/>,
    trash:<path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6" stroke={c} fill="none" strokeWidth="1.8" strokeLinecap="round"/>,
    dl:<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" stroke={c} fill="none" strokeWidth="1.8" strokeLinecap="round"/>,
    eye:<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8zM12 12a3 3 0 1 0 0-6 3 3 0 0 0 0 6z" stroke={c} fill="none" strokeWidth="1.8" strokeLinecap="round"/>,
    eoff:<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19M1 1l22 22" stroke={c} fill="none" strokeWidth="1.8" strokeLinecap="round"/>,
    ok:<path d="M20 6L9 17l-5-5" stroke={c} fill="none" strokeWidth="2.2" strokeLinecap="round"/>,
    out:<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" stroke={c} fill="none" strokeWidth="1.8" strokeLinecap="round"/>,
    msg:<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke={c} fill="none" strokeWidth="1.8" strokeLinecap="round"/>,
    key:<path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4" stroke={c} fill="none" strokeWidth="1.8" strokeLinecap="round"/>,
    shd:<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke={c} fill="none" strokeWidth="1.8" strokeLinecap="round"/>,
    cvt:<path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5" stroke={c} fill="none" strokeWidth="1.8" strokeLinecap="round"/>,
    usr:<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" stroke={c} fill="none" strokeWidth="1.8" strokeLinecap="round"/>,
    bk:<path d="M3 3h7v7H3zm11 0h7v7h-7zM3 14h7v7H3zm11 3h2v-3h2v3h2v2h-2v3h-2v-3h-2v-2z" fill={c}/>,
    em:<><rect x="2" y="4" width="20" height="16" rx="2" stroke={c} fill="none" strokeWidth="1.8"/><path d="M2 8l10 6 10-6" stroke={c} fill="none" strokeWidth="1.8" strokeLinecap="round"/></>,
    ch:<path d="M18 20V10M12 20V4M6 20v-6" stroke={c} fill="none" strokeWidth="2" strokeLinecap="round"/>,
    ar:<path d="M5 12h14M12 5l7 7-7 7" stroke={c} fill="none" strokeWidth="1.8" strokeLinecap="round"/>,
    cal:<path d="M8 2v3M16 2v3M3 8h18M5 4h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z" stroke={c} fill="none" strokeWidth="1.8" strokeLinecap="round"/>,
    rf:<path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" stroke={c} fill="none" strokeWidth="1.8" strokeLinecap="round"/>,
    gs:<path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke={c} fill="none" strokeWidth="1.8" strokeLinecap="round"/>,
  };
  return <svg width={s} height={s} viewBox="0 0 24 24" style={{flexShrink:0}}>{d[n]||null}</svg>;
};

function Login({users,onLogin}){
  const [u,setU]=useState("");const [p,setP]=useState("");const [sp,setSp]=useState(false);const [err,setErr]=useState("");const [shk,setShk]=useState(false);
  const go=()=>{const usr=users.find(x=>x.username.toLowerCase()===u.trim().toLowerCase());if(!usr){setErr("Username not found.");setShk(true);setTimeout(()=>setShk(false),500);return;}if(usr.password!==p){setErr("Incorrect password.");setShk(true);setTimeout(()=>setShk(false),500);return;}onLogin(usr);};
  return(
    <div style={{minHeight:"100vh",background:P.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{width:"100%",maxWidth:420}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{width:52,height:52,borderRadius:14,background:P.sb,display:"inline-flex",alignItems:"center",justifyContent:"center",marginBottom:14}}><Ic n="usr" s={24} c={P.acc}/></div>
          <h1 style={{margin:"0 0 4px",fontSize:26,fontWeight:800,color:P.tp,fontFamily:"Georgia,serif"}}>Lead Tracker</h1>
          <p style={{margin:0,color:P.ts,fontSize:13}}>Connected to Google Sheets · Sign in</p>
        </div>
        <div className={shk?"shk":""} style={{background:P.card,border:`1.5px solid ${P.bdr}`,borderRadius:16,padding:"24px 26px 20px",boxShadow:P.sh}}>
          <Fld label="Username"><Inp value={u} onChange={e=>{setU(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&go()} placeholder="Enter username" autoFocus/></Fld>
          <Fld label="Password">
            <div style={{position:"relative"}}><Inp type={sp?"text":"password"} value={p} onChange={e=>{setP(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&go()} placeholder="Enter password" style={{paddingRight:40}}/>
            <button onClick={()=>setSp(v=>!v)} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",display:"flex",padding:2}}><Ic n={sp?"eoff":"eye"} s={15} c={P.tm}/></button></div>
          </Fld>
          {err&&<div style={{padding:"8px 12px",borderRadius:7,background:P.dan+"10",border:`1.5px solid ${P.dan}33`,fontSize:12,color:P.dan,fontWeight:600,marginBottom:14}}>{err}</div>}
          <button onClick={go} style={{width:"100%",padding:11,background:`linear-gradient(135deg,${P.acc},#E2AA2E)`,color:"#fff",border:"none",borderRadius:9,fontSize:14,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}}>Sign In →</button>

        </div>
      </div>
    </div>
  );
}

function RemarkBox({onAdd,cu}){
  const [txt,setTxt]=useState("");const [ch,setCh]=useState("");const [rem,setRem]=useState("");
  const gc=(t,d)=>{const dt=new Date(d||Date.now());dt.setDate(dt.getDate()+1);const s=dt.toISOString().replace(/[-:]/g,"").slice(0,15)+"Z";const e=new Date(dt.getTime()+3600000).toISOString().replace(/[-:]/g,"").slice(0,15)+"Z";return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(t)}&dates=${s}/${e}`;};
  return(
    <div style={{background:P.bg,border:`1.5px solid ${P.bdr}`,borderRadius:10,padding:13,marginTop:12}}>
      {/* Show who is adding the remark */}
      <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:8,padding:"6px 10px",background:P.acl,borderRadius:7,border:`1px solid ${P.acc}33`}}>
        <Av name={cu.name} sz={20}/>
        <span style={{fontSize:11,color:P.tp,fontWeight:700}}>Adding as <span style={{color:P.acc}}>{cu.name}</span></span>
      </div>
      <Txa value={txt} onChange={e=>setTxt(e.target.value)} placeholder="Add a remark, update, or meeting note..." style={{marginBottom:10,background:"#fff"}}/>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
        <Sel value={ch} onChange={e=>setCh(e.target.value)} style={{flex:1,minWidth:140,background:"#fff"}}><option value="">Channel (optional)</option>{CHANNELS.map(c=><option key={c}>{c}</option>)}</Sel>
        <div style={{display:"flex",alignItems:"center",gap:5,flex:1,minWidth:160}}><Ic n="cal" s={12} c={P.tm}/><Inp type="date" value={rem} onChange={e=>setRem(e.target.value)} style={{flex:1,background:"#fff"}}/></div>
        {rem&&<a href={gc("Follow-up",rem)} target="_blank" rel="noreferrer"><Btn v="gh" sm icon="cal">GCal</Btn></a>}
        <Btn sm icon="msg" onClick={()=>{
          if(!txt.trim())return;
          onAdd({
            id:uid(),
            author:cu.name,
            authorId:cu.id,
            role:cu.role,
            text:txt,
            channel:ch,
            reminder:rem,
            date:new Date().toISOString()
          });
          setTxt("");setCh("");setRem("");
        }}>Add</Btn>
      </div>
    </div>
  );
}

function Remarks({remarks}){
  return(
    <div style={{display:"flex",flexDirection:"column",gap:8,marginTop:6}}>
      {(remarks||[]).map(r=>(
        <div key={r.id} style={{background:r.sys?P.acl:P.bg,borderRadius:9,padding:12,border:`1.5px solid ${r.sys?P.acc+"44":P.bdr}`}}>
          <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:5,flexWrap:"wrap"}}>
            <Av name={r.author||"?"} sz={22}/>
            <span style={{fontWeight:700,fontSize:12,color:P.tp}}>{r.author||"Unknown"}</span>
            <Bdg label={r.role==="admin"?"ADMIN":"SALES"} color={r.role==="admin"?P.acc:P.inf} sm/>
            {r.channel&&<Bdg label={r.channel} color="#7C3AED" sm/>}
            {r.sys&&<Bdg label="System" color={P.acc} sm/>}
            <span style={{marginLeft:"auto",fontSize:10,color:P.tm}}>{fdt(r.date)}</span>
          </div>
          <p style={{margin:0,fontSize:12,color:P.ts,lineHeight:1.6}}>{r.text}</p>
          {r.reminder&&<div style={{marginTop:6,fontSize:10,color:P.acc,fontWeight:600}}>⏰ Reminder: {fd(r.reminder)}</div>}
        </div>
      ))}
      {!(remarks||[]).length&&<div style={{color:P.tm,fontSize:12,textAlign:"center",padding:16,background:P.bg,borderRadius:8,border:`1.5px dashed ${P.bdr}`}}>No remarks yet.</div>}
    </div>
  );
}

function LeadDetail({lead,onClose,onUpdate,cu,users}){
  const [tab,setTab]=useState("info");const [editing,setEditing]=useState(false);
  const ce=cu.role==="admin"||cu.id===lead.assignedTo;
  const au=users.find(u=>u.id===lead.assignedTo);
  const chStage=s=>{const r={id:uid(),author:cu.name,authorId:cu.id,text:`Stage → "${s}"`,channel:"",date:new Date().toISOString(),sys:true};onUpdate({...lead,stage:s,remarks:[...(lead.remarks||[]),r],updatedAt:new Date().toISOString()});};
  const addR=useCallback(r=>onUpdate({...lead,remarks:[...(lead.remarks||[]),r],updatedAt:new Date().toISOString()}),[lead,onUpdate]);
  if(editing)return <Mdl title={lead.company} onClose={onClose} wide><LeadForm lead={lead} users={users} onClose={()=>setEditing(false)} onSave={d=>{onUpdate({...lead,...d,updatedAt:new Date().toISOString()});setEditing(false);}}/></Mdl>;
  return(
    <Mdl title={lead.company} subtitle={`${lead.contact} · ${lead.email}`} onClose={onClose} wide>
      <div style={{display:"flex",gap:7,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
        <Bdg label={lead.stage||"Opportunities"} color={SC[lead.stage||"Opportunities"]}/><Bdg label={lead.clientSector} color={P.inf}/><Bdg label={lead.leadSource} color="#7C3AED"/>
        {lead.fromEmailLog&&<Bdg label="From Email Log" color={P.suc}/>}
        <div style={{marginLeft:"auto"}}>{ce&&<Btn v="gh" sm icon="edit" onClick={()=>setEditing(true)}>Edit</Btn>}</div>
      </div>
      <div style={{display:"flex",marginBottom:18,borderBottom:`1.5px solid ${P.bdr}`}}>
        {["info","remarks","history"].map(t=><button key={t} onClick={()=>setTab(t)} style={{padding:"8px 16px",background:"none",border:"none",borderBottom:`2.5px solid ${tab===t?P.acc:"transparent"}`,color:tab===t?P.acc:P.ts,cursor:"pointer",fontSize:12,fontWeight:700,textTransform:"capitalize",fontFamily:"inherit"}}>{t}</button>)}
      </div>
      {tab==="info"&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 28px"}}>
          {[["Contact",lead.contact],["Email",lead.email],["Mobile",lead.mobile||"—"],["Type",lead.businessType||"—"],["Source",lead.leadSource],["Sector",lead.clientSector],["Assigned",au?.name||"Unassigned"],["Created",fd(lead.createdAt)],["Updated",fd(lead.updatedAt||lead.createdAt)]].map(([k,v])=>(
            <div key={k} style={{marginBottom:13}}><div style={{fontSize:10,color:P.tm,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:2}}>{k}</div><div style={{fontSize:13,color:P.tp,fontWeight:500}}>{v}</div></div>
          ))}
          {lead.notes&&<div style={{gridColumn:"1/-1",marginBottom:13}}><div style={{fontSize:10,color:P.tm,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:3}}>Notes</div><div style={{fontSize:12,color:P.ts,lineHeight:1.6,background:P.bg,padding:"9px 12px",borderRadius:7,border:`1px solid ${P.bdr}`}}>{lead.notes}</div></div>}
          {ce&&<div style={{gridColumn:"1/-1",marginTop:8}}>
            <Div/><div style={{fontSize:10,color:P.ts,marginBottom:8,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.8px"}}>Change Stage</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>{STAGES.map(s=>{const a=s===(lead.stage||"Opportunities");const col=SC[s];return <button key={s} onClick={()=>chStage(s)} style={{padding:"5px 11px",borderRadius:20,fontSize:10,fontWeight:700,border:`1.5px solid ${a?col:col+"55"}`,background:a?col:"transparent",color:a?"#fff":col,cursor:"pointer"}}>{s}</button>;})}</div>
          </div>}
        </div>
      )}
      {tab==="remarks"&&<><Remarks remarks={lead.remarks}/>{ce&&<RemarkBox onAdd={addR} cu={cu}/>}</>}
      {tab==="history"&&<div style={{maxHeight:380,overflowY:"auto"}}>{[...(lead.remarks||[])].sort((a,b)=>new Date(b.date)-new Date(a.date)).map((r,i,arr)=>(
        <div key={r.id} style={{display:"flex",gap:10,marginBottom:13}}>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}><Av name={r.author} sz={26}/>{i<arr.length-1&&<div style={{width:2,flex:1,background:P.bdr,margin:"3px 0"}}/>}</div>

  const [connErr,setConnErr]=useState(false);
  const pollRef=useRef(null);
  const saveTimer=useRef(null);

  const loadData=useCallback(async(quiet=false)=>{
    try{
      const d=await gasGet();
      if(d.users?.length)setUsers(d.users);
      if(d.leads)setLeads(d.leads);
      if(d.emails)setEmails(d.emails);
      setLastSync(new Date());

    }catch(e){setConnErr(true);}
    if(!quiet)setLoading(false);
  },[]);

  useEffect(()=>{loadData();},[]);
  useEffect(()=>{
    if(!li)return;
    pollRef.current=setInterval(()=>loadData(true),20000);
    return()=>clearInterval(pollRef.current);
  },[li]);

  const persist=useCallback((nl,ne,nu)=>{
    clearTimeout(saveTimer.current);
    setSaving(true);
    saveTimer.current=setTimeout(async()=>{
      try{await gasPost({leads:nl,emails:ne,users:nu});setLastSync(new Date());setConnErr(false);}
      catch{setConnErr(true);}
      setSaving(false);
    },700);
  },[]);

  const updLead=l=>{const nl=leads.map(x=>x.id===l.id?l:x);setLeads(nl);setSelLead(l);persist(nl,emails,users);};

  const fl=leads.filter(l=>{

        {view==="users"&&cu.role==="admin"&&(
          <div style={{padding:"24px 28px"}}>
            <h1 style={{margin:"0 0 4px",fontFamily:"Georgia,serif",fontSize:22,fontWeight:800,color:P.tp}}>User Management</h1>
            <p style={{margin:"0 0 16px",color:P.ts,fontSize:12}}>{users.length} team members · Saved to Google Sheets</p>
            <div style={{padding:"10px 14px",background:"#EFF6FF",border:`1.5px solid ${P.inf}33`,borderRadius:10,marginBottom:20,fontSize:12,color:P.inf,fontWeight:600,display:"flex",gap:8,alignItems:"center"}}><Ic n="shd" s={14} c={P.inf}/>Users added here are saved to Google Sheets and work on all devices immediately.</div>
            <UserMgmt users={users} onSaveUsers={saveUsers} cu={cu}/>
          </div>
        )}
      </div>

      {showLF&&<Mdl title="Add New Lead" onClose={()=>setShowLF(false)} wide><LeadForm users={users} onClose={()=>setShowLF(false)} onSave={addLead}/></Mdl>}
      {showEF&&<Mdl title="Log Outbound Email" onClose={()=>setShowEF(false)} wide><EmailLogForm onClose={()=>setShowEF(false)} onSave={addEmail}/></Mdl>}
      {selLead&&<LeadDetail lead={selLead} onClose={()=>setSelLead(null)} onUpdate={updLead} cu={cu} users={users}/>}
      {selEmail&&(
        <Mdl title={selEmail.subject} subtitle={`${selEmail.toCompany} · ${selEmail.toEmail}`} onClose={()=>setSelEmail(null)} wide>
          <div style={{display:"flex",gap:7,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
            <Bdg label={selEmail.status} color={{"Sent":P.inf,"Replied":P.suc,"No Response":P.acc,"Bounced":P.dan,"Converted":"#7C3AED"}[selEmail.status]||"#6B7280"}/>
            <Bdg label={selEmail.clientSector} color={P.inf}/>
            <span style={{marginLeft:"auto"}}>{!selEmail.converted?<Btn v="suc" sm icon="cvt" onClick={()=>convert(selEmail)}>Convert to Lead</Btn>:<Bdg label="✓ Converted" color={P.suc}/>}</span>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 24px"}}>
            {[["Company",selEmail.toCompany],["Contact",selEmail.toContact||"—"],["Email",selEmail.toEmail],["Sector",selEmail.clientSector],["Date Sent",fd(selEmail.sentDate)],["Status",selEmail.status]].map(([k,v])=>(
              <div key={k} style={{marginBottom:13}}><div style={{fontSize:10,color:P.tm,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:2}}>{k}</div><div style={{fontSize:13,color:P.tp,fontWeight:500}}>{v}</div></div>
            ))}
            {selEmail.body&&<div style={{gridColumn:"1/-1"}}><div style={{fontSize:10,color:P.tm,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:5}}>Body</div><div style={{background:P.bg,border:`1px solid ${P.bdr}`,borderRadius:8,padding:12,fontSize:12,color:P.ts,lineHeight:1.6,whiteSpace:"pre-wrap"}}>{selEmail.body}</div></div>}
          </div>
          <Div/>
          <Remarks remarks={selEmail.remarks}/>
          <RemarkBox onAdd={r=>updEmail({...selEmail,remarks:[...(selEmail.remarks||[]),r],updatedAt:new Date().toISOString()})} cu={cu}/>
        </Mdl>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
